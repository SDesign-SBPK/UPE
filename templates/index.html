<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <div class="container-md">
      <figure class="text-center">
        <h1>U.P.E.</h1>
        <p class="lead">
          Predict match outcomes with the click of a button.
        </p>
      </figure>      
      <div class="container-lg">
        <div class="row">
          <div class="col">
            <img src="/static/frisbee-man.jpeg" class="rounded float-start img-thumbnail" alt="...">
          </div>
          <div class="col">
            <img src="/static/brain.png" class="rounded float-end img-thumbnail" alt="...">
          </div>
        </div>
      </div>
      <div class="container-lg text-center">
        <div class="row">
          <div class="col">
            <form action="{{ url_for('input') }}">
              <input type="submit" class="btn btn-primary" value="Predict Match" />
            </form>
          </div>
          <div class="col">
            <form action="input.html">
              <input type="submit" class="btn btn-primary" value="Learn more about our prediction engine"/>
            </form> 
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
